<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAHAO | 数字创意工作室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: white;
            overflow-x: hidden;
        }
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle at center, #1a1a2e, #0a0a0a 70%);
        }
        .hero h1 {
            font-size: 60px;
            background: linear-gradient(90deg, #4cc9f0, #72efdd);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        .hero p {
            font-size: 20px;
            color: #ccc;
            max-width: 700px;
            line-height: 1.6;
        }
        .btn {
            margin-top: 30px;
            padding: 14px 36px;
            border-radius: 50px;
            background: linear-gradient(90deg, #4cc9f0, #72efdd);
            color: #000;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            transform: scale(1.06);
        }
        .section {
            padding: 80px 20px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .section h2 {
            font-size: 32px;
            margin-bottom: 40px;
            text-align: center;
            color: #fff;
        }
        .card-box {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }
        .card {
            background: #121212;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #222;
            transition: 0.3s;
        }
        .card:hover {
            border-color: #4cc9f0;
            transform: translateY(-6px);
        }
        .card h3 {
            color: #4cc9f0;
            margin-bottom: 14px;
        }
        .footer {
            padding: 40px 20px;
            text-align: center;
            color: #666;
            background: #0a0a0a;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>DAHAO</h1>
        <p>数字创意 · AI视觉 · 交互设计 · 智能网站</p>
        <p>我们用技术创造有温度、有未来感的数字体验</p>
        <button class="btn">了解我们</button>
    </div>

    <div class="section">
        <h2>我们的服务</h2>
        <div class="card-box">
            <div class="card">
                <h3>AI 视觉设计</h3>
                <p>利用人工智能生成品牌视觉、海报、插画与创意素材。</p>
            </div>
            <div class="card">
                <h3>创意网站搭建</h3>
                <p>高端定制官网、个人主页、作品集、电商展示网站。</p>
            </div>
            <div class="card">
                <h3>智能交互体验</h3>
                <p>动效、3D、轻量化交互，让网页更有趣、更有科技感。</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>DAHAO 数字创意工作室 © 2026</p>
    </div>

</body>
</html>
