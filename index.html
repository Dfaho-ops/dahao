<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAHAO GROUP | 大昊昊国际贸易集团</title>
    <style>
        /* 基础设置 */
        body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        /* 顶部大标题区域 */
        header { 
            height: 70vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
            background: linear-gradient(180deg, #111 0%, #000 100%);
            padding: 0 20px;
        }
        .hero-title { font-size: 3.5rem; font-weight: 700; margin: 0; background: linear-gradient(to right, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-sub { font-size: 1.2rem; color: #86868b; margin-top: 15px; letter-spacing: 2px; }

        /* 内容卡片区 */
        .container { max-width: 1000px; margin: -50px auto 50px; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #1c1c1e; border-radius: 20px; padding: 35px; border: 1px solid #333; }
        .card h3 { color: #00c853; margin-top: 0; font-size: 1.5rem; }
        .card p { color: #86868b; line-height: 1.6; font-size: 1rem; }

        /* 微信悬浮球 */
        .wechat-btn {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            background: #07c160; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 999;
        }

        /* 弹窗样式 */
        #wechatModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-box { 
            background: #2c2c2e; padding: 30px; border-radius: 25px; text-align: center;
            width: 280px; border: 1px solid #444; 
        }
        .wechat-id { background: #3a3a3c; padding: 10px; border-radius: 8px; color: #07c160; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>

    <header>
        <h1 class="hero-title">DAHAO GROUP</h1>
        <p class="hero-sub">大昊昊国际贸易集团 · 东南亚跨境领航</p>
    </header>

    <div class="container">
        <div class="grid">
            <div class="card">
                <h3>数字化运营</h3>
                <p>TikTok、Shopee、Lazada 全矩阵覆盖，精准大数据分析，助力品牌快速出海。</p>
            </div>
            <div class="card">
                <h3>智连供应链</h3>
                <p>直连长三角、珠三角优质源头工厂，提供柔性定制与一站式全球供应方案。</p>
            </div>
        </div>
    </div>

    <div class="wechat-btn" onclick="openModal()">
        <span style="font-size: 30px;">💬</span>
    </div>

    <div id="wechatModal" onclick="closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h2 style="margin:0;">联系我们</h2>
            <p style="color:#86868b; font-size: 0.9rem;">商务合作与业务咨询</p>
            <div style="width:180px; height:180px; background:#fff; margin:15px auto; display:flex; align-items:center; justify-content:center; color:#000; border-radius:10px;">
                二维码加载中...
            </div>
            <div class="wechat-id">微信号：dahao_ops</div>
            <button onclick="closeModal()" style="background:none; border:none; color:#86868b; cursor:pointer; margin-top:10px;">[ 返回网站 ]</button>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('wechatModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('wechatModal').style.display = 'none'; }
    </script>

</body>
</html>
