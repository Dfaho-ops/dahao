<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAHAO | 数字创意工作室</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --accent: #4cc9f0;
            --card: #121212;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle at center, #1a1a2e, #0a0a0a 70%);
        }
        .hero h1 {
            font-size: 50px;
            background: linear-gradient(90deg, var(--accent), #72efdd);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 15px;
        }
        .hero p {
            font-size: 18px;
            color: #ccc;
            max-width: 600px;
        }
        .btn {
            margin-top: 25px;
            padding: 12px 32px;
            border-radius: 30px;
            background: linear-gradient(90deg, var(--accent), #72efdd);
            color: #000;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .section {
            padding: 60px 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .section h2 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #222;
            transition: 0.3s;
        }
        .card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }
        .card h3 {
            color: var(--accent);
            margin-bottom: 10px;
        }
        .card p {
            color: #aaa;
            font-size: 14px;
        }
        .footer {
            padding: 30px 20px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>DAHAO</h1>
        <p>数字创意 · AI视觉 · 交互设计 · 智能网站</p>
        <p>我们用技术创造有温度、有未来感的数字体验</p>
        <button class="btn">探索我们</button>
    </div>

    <div class="section">
        <h2>我们的服务</h2>
        <div class="grid">
            <div class="card">
                <h3>AI 视觉设计</h3>
                <p>利用人工智能生成品牌视觉、海报、插画与创意素材。</p>
            </div>
            <div class="card">
                <h3>创意网站搭建</h3>
                <p>高端定制官网、个人主页、作品集、电商展示网站。</p>
            </div>
            <div class="card">
                <h3>智能交互体验</h3>
                <p>动效、3D、轻量化交互，让网页更有趣、更有科技感。</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>DAHAO 数字创意工作室 © 2026</p>
    </div>
</body>
</html>
