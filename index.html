<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAHAO GROUP | 大昊昊国际贸易集团</title>
    <style>
        :root { --apple-black: #000000; --apple-gray: #1d1d1f; --apple-blue: #00c853; --text-gray: #86868b; }
        body { margin: 0; background-color: var(--apple-black); color: #f5f5f7; font-family: -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }

        /* --- 头部 Hero --- */
        header { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; }
        .hero-title { font-size: clamp(3rem, 12vw, 6rem); font-weight: 600; letter-spacing: -0.02em; background: linear-gradient(to right, #fff, #86868b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-sub { font-size: 1.5rem; color: var(--text-gray); margin-top: 20px; }

        /* --- 内容网格 --- */
        .container { max-width: 1100px; margin: 0 auto; padding: 50px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
        .apple-card { background: var(--apple-gray); border-radius: 22px; padding: 40px; border: 1px solid rgba(255,255,255,0.05); }
        .apple-card h3 { font-size: 1.8rem; margin-bottom: 15px; color: #fff; }
        .apple-card p { color: var(--text-gray); line-height: 1.6; }

        /* --- 右下角微信悬浮球 --- */
        .wechat-float {
            position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px;
            background: #07c160; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(7, 193, 96, 0.4); cursor: pointer; z-index: 10000;
            transition: 0.3s;
        }
        .wechat-float:hover { transform: scale(1.1); }
        .wechat-icon { width: 35px; height: 35px; fill: white; }

        /* --- 微信弹出层 (Modal) --- */
        .wechat-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            z-index: 10001; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #2c2c2e; padding: 40px; border-radius: 30px; text-align: center;
            width: 300px; border: 1px solid rgba(255,255,255,0.1);
            animation: modalIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .qr-placeholder { width: 200px; height: 200px; background: white; margin: 20px auto; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }
        .wechat-id { font-size: 1.2rem; color: #07c160; margin: 15px 0; font-weight: bold; }
        .close-btn { color: var(--text-gray); cursor: pointer; margin-top: 20px; display: inline-block; }

        footer { text-align: center; padding: 80px; color: #444; border-top: 1px solid #333; }
    </style>
</head>
<body>
