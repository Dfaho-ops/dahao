<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAHAO GROUP | 东南亚跨境贸易指挥中心</title>
    <style>
        :root { --main-blue: #001a33; --tech-blue: #00d4ff; --glow: rgba(0, 212, 255, 0.5); }
        body { margin: 0; background: var(--main-blue); color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* 动态背景动画：模拟流光 */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #002b52 0%, #001a33 100%);
            z-index: -1;
        }
        .stream {
            position: absolute; width: 2px; height: 100px;
            background: linear-gradient(to bottom, transparent, var(--tech-blue));
            animation: flow 4s linear infinite; opacity: 0.3;
        }
        @keyframes flow {
            0% { transform: translateY(-100px) translateX(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(100vh) translateX(200px); opacity: 0; }
        }

        /* 核心内容布局 */
        header { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero-title { 
            font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 800; 
            background: linear-gradient(to right, #fff, var(--tech-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 4px; filter: drop-shadow(0 0 10px var(--glow));
        }
        .hero-sub { font-size: 1.2rem; color: var(--tech-blue); letter-spacing: 8px; margin-top: 10px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 50px 20px; }
        
        /* 科技感卡片 */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .tech-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 40px; border-radius: 2px; position: relative; overflow: hidden;
            backdrop-filter: blur(10px); transition: 0.4s;
        }
        .tech-card:hover { border-color: var(--tech-blue); background: rgba(255, 255, 255, 0.08); transform: scale(1.02); }
        .tech-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 40px; height: 40px;
            border-top: 2px solid var(--tech-blue); border-left: 2px solid var(--tech-blue);
        }
        
        h3 { color: var(--tech-blue); margin-bottom: 15px; font-size: 1.5rem; }
        p { line-height: 1.8; color: #b0c4de; }

        footer { text-align: center; padding: 100px 20px; border-top: 1px solid rgba(0, 212, 255, 0.1); color: #666; }
    </style>
</head>
